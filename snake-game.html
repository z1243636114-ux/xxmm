<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .title {
            font-size: 2rem;
            color: #e94560;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .score-box {
            background: #16213e;
            color: #0f3460;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-box .label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-box .value {
            font-size: 2rem;
            color: #e94560;
            font-weight: bold;
        }

        .high-score-box {
            background: #16213e;
            color: #0f3460;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .high-score-box .label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .high-score-box .value {
            font-size: 2rem;
            color: #f0a500;
            font-weight: bold;
        }

        canvas {
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.3), 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(233, 69, 96, 0.6);
        }

        .btn-pause {
            background: linear-gradient(135deg, #f0a500, #d18c00);
            color: white;
            box-shadow: 0 4px 15px rgba(240, 165, 0, 0.4);
        }

        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(240, 165, 0, 0.6);
        }

        .hint {
            color: #555;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        .hint span {
            color: #e94560;
            background: #16213e;
            padding: 4px 10px;
            border-radius: 6px;
            margin: 0 4px;
            font-weight: bold;
        }

        .speed-indicator {
            color: #999;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        @media (max-width: 500px) {
            canvas {
                border-radius: 10px;
            }
            .title {
                font-size: 1.4rem;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score-box">
                <div class="label">得分</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="title">🐍 贪吃蛇</div>
            <div class="high-score-box">
                <div class="label">最高分</div>
                <div class="value" id="highScore">0</div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <button class="btn btn-start" id="btnStart" onclick="startGame()">🎮 开始游戏</button>
            <button class="btn btn-pause" id="btnPause" onclick="togglePause()" disabled>⏯️ 暂停</button>
        </div>
        <div class="hint">
            方向键 <span>↑ ↓ ← →</span> 或 <span>W A S D</span> 控制方向
        </div>
        <div class="hint">
            按 <span>空格键</span> 暂停/继续
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 画布大小
        const GRID_SIZE = 20;
        const COLS = 25;
        const ROWS = 25;
        canvas.width = COLS * GRID_SIZE;
        canvas.height = ROWS * GRID_SIZE;

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = 0;
        let gameLoop = null;
        let gameRunning = false;
        let gamePaused = false;
        let speed = 100;
        let particles = [];
        let trails = [];

        // 加载最高分
        const savedHighScore = localStorage.getItem('snakeHighScore');
        if (savedHighScore) {
            highScore = parseInt(savedHighScore);
            document.getElementById('highScore').textContent = highScore;
        }

        function initGame() {
            // 蛇从中间开始
            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY },
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 100;
            particles = [];
            trails = [];
            document.getElementById('score').textContent = '0';
            generateFood();
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS),
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));

            // 食物发光粒子
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: food.x * GRID_SIZE + GRID_SIZE / 2,
                    y: food.y * GRID_SIZE + GRID_SIZE / 2,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 3,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.03,
                    color: Math.random() < 0.5 ? '#e94560' : '#f0a500',
                });
            }
        }

        function update() {
            // 应用方向
            direction = { ...nextDirection };

            // 移动蛇头
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 穿墙检测
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }

            // 撞自己检测
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            // 添加拖尾
            trails.push({
                x: snake[0].x * GRID_SIZE + GRID_SIZE / 2,
                y: snake[0].y * GRID_SIZE + GRID_SIZE / 2,
                life: 1,
                decay: 0.08,
            });

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                // 加速
                if (speed > 50) {
                    speed -= 2;
                }
                generateFood();
                // 吃食物爆炸粒子
                for (let i = 0; i < 15; i++) {
                    particles.push({
                        x: food.x * GRID_SIZE + GRID_SIZE / 2,
                        y: food.y * GRID_SIZE + GRID_SIZE / 2,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 0.7 + Math.random() * 0.3,
                        decay: 0.03 + Math.random() * 0.05,
                        color: ['#e94560', '#f0a500', '#fff', '#0f3460'][Math.floor(Math.random() * 4)],
                    });
                }
            } else {
                snake.pop();
            }

            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                return p.life > 0;
            });

            // 更新拖尾
            trails = trails.filter(t => {
                t.life -= t.decay;
                return t.life > 0;
            });
        }

        function draw() {
            // 清屏
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画网格
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * GRID_SIZE, 0);
                ctx.lineTo(x * GRID_SIZE, ROWS * GRID_SIZE);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * GRID_SIZE);
                ctx.lineTo(COLS * GRID_SIZE, y * GRID_SIZE);
                ctx.stroke();
            }

            // 画拖尾
            trails.forEach(t => {
                ctx.beginPath();
                ctx.arc(t.x, t.y, 4 * t.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(233, 69, 96, ${t.life * 0.3})`;
                ctx.fill();
            });

            // 画蛇身 - 从尾到头
            snake.forEach((seg, index) => {
                const x = seg.x * GRID_SIZE;
                const y = seg.y * GRID_SIZE;
                const progress = index / snake.length;

                // 身体阴影
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(x + 2, y + 2, GRID_SIZE - 2, GRID_SIZE - 2);

                // 身体主体
                if (index === 0) {
                    // 蛇头
                    const gradient = ctx.createRadialGradient(
                        x + GRID_SIZE / 2, y + GRID_SIZE / 2, 2,
                        x + GRID_SIZE / 2, y + GRID_SIZE / 2, GRID_SIZE / 1.5
                    );
                    gradient.addColorStop(0, '#ff6b81');
                    gradient.addColorStop(1, '#c23152');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);

                    // 蛇眼睛
                    ctx.fillStyle = '#fff';
                    const eyeSize = 4;
                    const eyeOffset = 5;
                    if (direction.x === 1) {
                        // 向右
                        ctx.beginPath();
                        ctx.arc(x + GRID_SIZE - eyeOffset - 1, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + GRID_SIZE - eyeOffset - 1, y + GRID_SIZE - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(x + GRID_SIZE - eyeOffset, y + eyeOffset, 2, 0, Math.PI * 2);
                        ctx.arc(x + GRID_SIZE - eyeOffset, y + GRID_SIZE - eyeOffset, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.x === -1) {
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset + 1, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + eyeOffset + 1, y + GRID_SIZE - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + eyeOffset, 2, 0, Math.PI * 2);
                        ctx.arc(x + eyeOffset, y + GRID_SIZE - eyeOffset, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === -1) {
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + eyeOffset + 1, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + GRID_SIZE - eyeOffset, y + eyeOffset + 1, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + eyeOffset, 2, 0, Math.PI * 2);
                        ctx.arc(x + GRID_SIZE - eyeOffset, y + eyeOffset, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + GRID_SIZE - eyeOffset - 1, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + GRID_SIZE - eyeOffset, y + GRID_SIZE - eyeOffset - 1, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + GRID_SIZE - eyeOffset, 2, 0, Math.PI * 2);
                        ctx.arc(x + GRID_SIZE - eyeOffset, y + GRID_SIZE - eyeOffset, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    // 蛇身渐变
                    const alpha = 1 - progress * 0.5;
                    const r = Math.floor(233 - progress * 150);
                    const g = Math.floor(69 - progress * 40);
                    const b = Math.floor(96 - progress * 60);
                    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;

                    const padding = 2;
                    const borderRadius = 6;
                    roundRect(x + padding, y + padding, GRID_SIZE - padding * 2, GRID_SIZE - padding * 2, borderRadius);
                }
            });

            // 画食物
            const fx = food.x * GRID_SIZE;
            const fy = food.y * GRID_SIZE;

            // 食物光晕
            const glowGradient = ctx.createRadialGradient(
                fx + GRID_SIZE / 2, fy + GRID_SIZE / 2, 2,
                fx + GRID_SIZE / 2, fy + GRID_SIZE / 2, GRID_SIZE
            );
            glowGradient.addColorStop(0, 'rgba(240, 165, 0, 0.5)');
            glowGradient.addColorStop(1, 'rgba(240, 165, 0, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(fx - 4, fy - 4, GRID_SIZE + 8, GRID_SIZE + 8);

            // 食物主体
            const foodGradient = ctx.createRadialGradient(
                fx + GRID_SIZE / 2, fy + GRID_SIZE / 2, 1,
                fx + GRID_SIZE / 2, fy + GRID_SIZE / 2, GRID_SIZE / 2
            );
            foodGradient.addColorStop(0, '#fddb8c');
            foodGradient.addColorStop(0.5, '#f0a500');
            foodGradient.addColorStop(1, '#c27800');
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(fx + GRID_SIZE / 2, fy + GRID_SIZE / 2, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // 食物高光
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(fx + GRID_SIZE / 2 - 3, fy + GRID_SIZE / 2 - 3, 3, 0, Math.PI * 2);
            ctx.fill();

            // 画粒子
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `, ${p.life})`).replace('rgb', 'rgba');
                if (p.color.startsWith('#')) {
                    const hex = p.color;
                    ctx.fillStyle = hexToRgba(hex, p.life);
                }
                ctx.fill();
            });

            // 暂停遮罩
            if (gamePaused && gameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText('⏸ 暂停中', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'start';
            }
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;
            gameRunning = false;

            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            // 绘制游戏结束画面
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#e94560';
            ctx.font = 'bold 40px "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);

            ctx.fillStyle = '#fff';
            ctx.font = '20px "Segoe UI"';
            ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 30);

            if (score >= highScore && score > 0) {
                ctx.fillStyle = '#f0a500';
                ctx.font = 'bold 16px "Segoe UI"';
                ctx.fillText('🎉 新纪录！', canvas.width / 2, canvas.height / 2 + 60);
            }

            ctx.textAlign = 'start';

            document.getElementById('btnStart').textContent = '🔄 重新开始';
            document.getElementById('btnPause').disabled = true;
        }

        function startGame() {
            if (gameLoop) clearInterval(gameLoop);
            initGame();
            gameRunning = true;
            gamePaused = false;
            document.getElementById('btnStart').textContent = '🔄 重新开始';
            document.getElementById('btnPause').disabled = false;
            document.getElementById('btnPause').textContent = '⏯️ 暂停';
            gameLoop = setInterval(() => {
                if (!gamePaused) {
                    update();
                }
                draw();
            }, speed);
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            document.getElementById('btnPause').textContent = gamePaused ? '▶️ 继续' : '⏯️ 暂停';
            if (!gamePaused) {
                // 更新速度
                clearInterval(gameLoop);
                gameLoop = setInterval(() => {
                    if (!gamePaused) {
                        update();
                    }
                    draw();
                }, speed);
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning && e.code === 'Space') {
                e.preventDefault();
                startGame();
                return;
            }

            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
                return;
            }

            if (gamePaused || !gameRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;
            }
        });

        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
